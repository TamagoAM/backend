version: "3.9"
services:
  api:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - mysql
      - redis
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: tamago
      MYSQL_USER: tamago
      MYSQL_PASSWORD: tamago
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    command: ["--default-authentication-plugin=mysql_native_password"]
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]

  # ─── Payment Microservice ──────────────────────────────────
  payment:
    build:
      context: ../payment
      dockerfile: Dockerfile
    env_file:
      - ../payment/.env
    depends_on:
      - mysql
      - redis
    restart: unless-stopped

  # ─── Email Microservice ────────────────────────────────────
  email:
    build:
      context: ../email
      dockerfile: Dockerfile
    env_file:
      - ../email/.env
    depends_on:
      - redis
      - mailhog
    restart: unless-stopped

  # ─── MailHog (dev SMTP + web UI) ───────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    restart: unless-stopped
